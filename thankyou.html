<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You — Shop with Princess</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body class="has-bottom-nav">

<header>
  <div class="top-row">
    <a href="index.html" class="wordmark" style="text-decoration:none; color:inherit;">SHOP WITH <span>PRINCESS</span></a>
    <nav>
      <a href="index.html">Home</a>
      <a href="shop.html">Shop</a>
      <a href="index.html#contact">Contact</a>
    </nav>
  </div>
</header>

<section class="checkout-page">
  <div class="section-head">
    <h2>Thank You 🌹</h2>
  </div>
  <div id="thankyou-root"></div>
</section>

<div id="bottom-nav-mount"></div>

<script src="js/data.js"></script>
<script src="js/cart.js"></script>
<script>
  document.getElementById('bottom-nav-mount').outerHTML = `
    <nav class="bottom-nav">
      <a href="index.html" class="bn-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
        <span>Home</span>
      </a>
      <a href="shop.html" class="bn-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 8l1-4h10l1 4"/><rect x="4" y="8" width="16" height="12" rx="1"/></svg>
        <span>Shop</span>
      </a>
      <a href="index.html#contact" class="bn-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 11.5a8.4 8.4 0 01-8.9 8.4A8.5 8.5 0 014 12.1 8.4 8.4 0 0112.4 4a8.4 8.4 0 018.6 7.5z"/></svg>
        <span>Contact</span>
      </a>
      <a href="cart.html" class="bn-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 8l1-4h10l1 4"/><rect x="4" y="8" width="16" height="12" rx="1"/></svg>
        <span>Bag</span>
        <span id="bag-badge" class="bag-badge"></span>
      </a>
    </nav>
  `;

  const orderRaw = sessionStorage.getItem('swp_order');
  const root = document.getElementById('thankyou-root');

  if(!orderRaw){
    root.innerHTML = `
      <p style="color:var(--ink-dim);">No recent order found.</p>
      <br>
      <a class="hero-cta" href="shop.html">Back to Shop →</a>
    `;
  }else{
    const order = JSON.parse(orderRaw);

    root.innerHTML = `
      <p style="color:var(--ink-dim); line-height:1.7; margin-bottom:20px;">
        Thanks, ${order.name.split(' ')[0]}! Your order total is <strong>R${order.total}</strong>,
        for delivery to: ${order.address}.
      </p>
      <p style="color:var(--ink-dim); line-height:1.7; margin-bottom:24px;">
        A WhatsApp message with your full order should have opened just now — if it didn't,
        tap below to send it. Princess will reply directly to sort out payment (${order.method}) and delivery.
      </p>
      <a class="hero-cta" id="confirm-whatsapp" href="#" target="_blank" rel="noopener">Message Princess on WhatsApp →</a>
      <br><br>
      <a class="hero-cta hero-cta--ghost" href="shop.html">Continue Shopping</a>
    `;

    const lines = order.cart.map(line => {
      const product = typeof getProduct === 'function' ? getProduct(line.id) : null;
      return product ? `${product.name} (${line.color}, Size ${line.size}) x${line.qty}` : '';
    }).filter(Boolean).join('\n');

    const text = `Hi Princess, it's ${order.name}. Following up on my order:\n\n${lines}\n\nTotal: R${order.total}\nPayment method: ${order.method}\nDelivery: ${order.address}\nPhone: ${order.phone}`;
    document.getElementById('confirm-whatsapp').href = `https://wa.me/27729103254?text=${encodeURIComponent(text)}`;

    // Clear the cart now that checkout is complete
    clearCart();
    sessionStorage.removeItem('swp_order');
  }
</script>

</body>
</html>
