<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Bag — Shop with Princess</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body class="has-bottom-nav">

<header>
  <div class="top-row">
    <a href="index.html" class="wordmark" style="text-decoration:none; color:inherit;">SHOP WITH <span>PRINCESS</span></a>
    <nav>
      <a href="index.html">Home</a>
      <a href="shop.html">Shop</a>
      <a href="index.html#contact">Contact</a>
    </nav>
  </div>
</header>

<section class="cart-page">
  <div class="section-head">
    <h2>Your Bag</h2>
  </div>
  <div id="cart-root"></div>
</section>

<div id="bottom-nav-mount"></div>

<script src="js/data.js"></script>
<script src="js/icons.js"></script>
<script src="js/cart.js"></script>
<script>
  document.getElementById('bottom-nav-mount').outerHTML = `
    <nav class="bottom-nav">
      <a href="index.html" class="bn-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
        <span>Home</span>
      </a>
      <a href="shop.html" class="bn-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 8l1-4h10l1 4"/><rect x="4" y="8" width="16" height="12" rx="1"/></svg>
        <span>Shop</span>
      </a>
      <a href="index.html#contact" class="bn-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 11.5a8.4 8.4 0 01-8.9 8.4A8.5 8.5 0 014 12.1 8.4 8.4 0 0112.4 4a8.4 8.4 0 018.6 7.5z"/></svg>
        <span>Contact</span>
      </a>
      <a href="cart.html" class="bn-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 8l1-4h10l1 4"/><rect x="4" y="8" width="16" height="12" rx="1"/></svg>
        <span>Bag</span>
        <span id="bag-badge" class="bag-badge"></span>
      </a>
    </nav>
  `;
  updateBagBadge();


  function render(){
    const cart = getCart();
    const root = document.getElementById('cart-root');

    if(cart.length === 0){
      root.innerHTML = `
        <div class="cart-empty">
          <p>Your bag is empty.</p>
          <br>
          <a class="hero-cta" href="shop.html">Start shopping →</a>
        </div>
      `;
      return;
    }

    let linesHtml = '';
    cart.forEach((line, index) => {
      const product = getProduct(line.id);
      if(!product) return;
      const visual = product.img
        ? `<img src="${product.img}" alt="${product.name}">`
        : (ICONS[product.icon] || '');
      linesHtml += `
        <div class="cart-line">
          <div class="cart-line-image">${visual}</div>
          <div class="cart-line-info">
            <h4>${product.name}</h4>
            <div class="meta">${line.color} · Size ${line.size}</div>
            <div class="cart-line-qty">
              <button onclick="changeQty(${index}, -1)">−</button>
              <span>${line.qty}</span>
              <button onclick="changeQty(${index}, 1)">+</button>
            </div>
            <button class="cart-line-remove" onclick="removeLine(${index})">Remove</button>
          </div>
          <div class="cart-line-price">R${product.price * line.qty}</div>
        </div>
      `;
    });

    const total = cartTotal();

    root.innerHTML = `
      ${linesHtml}
      <div class="cart-summary">
        <div class="cart-summary-row">
          <span>Subtotal</span>
          <span>R${total}</span>
        </div>
        <div class="cart-summary-row">
          <span>Delivery</span>
          <span>Calculated at checkout</span>
        </div>
        <div class="cart-summary-row total">
          <span>Total</span>
          <span>R${total}</span>
        </div>
        <a class="hero-cta" href="checkout.html" style="width:100%; text-align:center; margin-top:20px; display:block;">Proceed to Checkout →</a>
      </div>
    `;
  }

  function changeQty(index, delta){
    const cart = getCart();
    const newQty = cart[index].qty + delta;
    updateCartLineQty(index, newQty);
    render();
  }

  function removeLine(index){
    removeCartLine(index);
    render();
  }

  render();
</script>

</body>
</html>
