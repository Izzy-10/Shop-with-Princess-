<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product — Shop with Princess</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body class="has-bottom-nav">

<header>
  <div class="top-row">
    <a href="index.html" class="wordmark" style="text-decoration:none; color:inherit;">SHOP WITH <span>PRINCESS</span></a>
    <nav>
      <a href="index.html">Home</a>
      <a href="shop.html">Shop</a>
      <a href="index.html#contact">Contact</a>
    </nav>
  </div>
</header>

<div id="product-root"></div>

<div id="bottom-nav-mount"></div>

<script src="js/data.js"></script>
<script src="js/icons.js"></script>
<script src="js/cart.js"></script>
<script>
  document.getElementById('bottom-nav-mount').outerHTML = `
    <nav class="bottom-nav">
      <a href="index.html" class="bn-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
        <span>Home</span>
      </a>
      <a href="shop.html" class="bn-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 8l1-4h10l1 4"/><rect x="4" y="8" width="16" height="12" rx="1"/></svg>
        <span>Shop</span>
      </a>
      <a href="index.html#contact" class="bn-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 11.5a8.4 8.4 0 01-8.9 8.4A8.5 8.5 0 014 12.1 8.4 8.4 0 0112.4 4a8.4 8.4 0 018.6 7.5z"/></svg>
        <span>Contact</span>
      </a>
      <a href="cart.html" class="bn-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 8l1-4h10l1 4"/><rect x="4" y="8" width="16" height="12" rx="1"/></svg>
        <span>Bag</span>
        <span id="bag-badge" class="bag-badge"></span>
      </a>
    </nav>
  `;
  updateBagBadge();


  const swatchHex = {
    Black: '#2a2320', White: '#f5f0ec', Red: '#c0453a', Blue: '#3a6ea5'
  };

  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  const product = getProduct(id);
  const root = document.getElementById('product-root');

  if(!product){
    root.innerHTML = `<section style="padding:8vh 6vw;"><p>Sorry, we couldn't find that item. <a href="shop.html">Back to Shop</a></p></section>`;
  }else{
    const visual = product.img
      ? `<img src="${product.img}" alt="${product.name}">`
      : (ICONS[product.icon] || '');

    root.innerHTML = `
      <section class="product-detail">
        <div class="product-detail-image">${visual}</div>
        <div class="product-detail-body">
          <div class="cat">${product.category}</div>
          <h1>${product.name}</h1>
          <div class="price">R${product.price}</div>

          <div class="option-group">
            <div class="option-label">Colour</div>
            <div class="swatches" id="swatches">
              ${product.colors.map(c => `<div class="swatch" data-color="${c}" style="background:${swatchHex[c] || '#ccc'}" title="${c}"></div>`).join('')}
            </div>
          </div>

          <div class="option-group">
            <div class="option-label">Size</div>
            <div class="size-pills" id="size-pills">
              ${product.sizes.map(s => `<div class="size-pill" data-size="${s}">${s}</div>`).join('')}
            </div>
          </div>

          <div class="qty-row">
            <div class="qty-stepper">
              <button id="qty-minus" type="button">−</button>
              <span id="qty-value">1</span>
              <button id="qty-plus" type="button">+</button>
            </div>
            <button class="add-to-bag" id="add-to-bag" disabled>Select colour & size</button>
          </div>
          <div class="select-hint" id="select-hint">Please choose a colour and size first.</div>
        </div>
      </section>
    `;

    let selectedColor = null;
    let selectedSize = null;
    let qty = 1;

    const addBtn = document.getElementById('add-to-bag');
    const hint = document.getElementById('select-hint');

    function refreshButton(){
      if(selectedColor && selectedSize){
        addBtn.disabled = false;
        addBtn.textContent = 'Add to Bag';
      }else{
        addBtn.disabled = true;
        addBtn.textContent = 'Select colour & size';
      }
    }

    document.querySelectorAll('.swatch').forEach(el => {
      el.addEventListener('click', () => {
        document.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
        el.classList.add('selected');
        selectedColor = el.dataset.color;
        refreshButton();
      });
    });

    document.querySelectorAll('.size-pill').forEach(el => {
      el.addEventListener('click', () => {
        document.querySelectorAll('.size-pill').forEach(s => s.classList.remove('selected'));
        el.classList.add('selected');
        selectedSize = el.dataset.size;
        refreshButton();
      });
    });

    document.getElementById('qty-minus').addEventListener('click', () => {
      if(qty > 1) qty--;
      document.getElementById('qty-value').textContent = qty;
    });
    document.getElementById('qty-plus').addEventListener('click', () => {
      qty++;
      document.getElementById('qty-value').textContent = qty;
    });

    addBtn.addEventListener('click', () => {
      if(!selectedColor || !selectedSize){
        hint.style.display = 'block';
        return;
      }
      addToCart(product.id, selectedSize, selectedColor, qty);
      addBtn.textContent = 'Added ✓';
      setTimeout(() => { addBtn.textContent = 'Add to Bag'; }, 1400);
    });
  }
</script>

</body>
</html>
